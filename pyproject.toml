[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "simple-rl"
version = "0.1.0"
description = "Simulation-heavy roguelike/RPG research project."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.24",
  "polars>=0.20",
  "numba>=0.57",
  "scipy>=1.10",
  "scikit-image>=0.22",
  "joblib>=1.3",
  "PySide6>=6.5",
  "pygame>=2.5",
  "matplotlib>=3.7",
  "Pillow>=9.2",
  "structlog>=23.1",
  "PyYAML>=6.0",
  "readchar>=4.0",
  "pydub>=0.25.1",
  "simpleaudio>=1.0.4",
# removed  "openal>=1.1.1", now provided via mamba
]

[project.optional-dependencies]
dev = ["pytest>=7.4"]

[tool.setuptools.packages.find]
where = ["."]
