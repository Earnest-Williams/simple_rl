name: Worldgen CI

on:
  push:
    branches: [World-Gen, main]
  pull_request:
    branches: [World-Gen, main]

jobs:
  lint:
    name: Lint & Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        # Use the project dev extras so we get mypy/black/ruff as configured
        run: |
          python -m pip install -U pip
          # prefer installing via pyproject extras so dev deps are consistent
          pip install -e '.[dev]'

      - name: Check formatting with black
        run: black --check .

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        # mypy will pick up configuration from pyproject.toml
        run: mypy --show-error-codes --config-file pyproject.toml .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest
      - name: Precompile numba caches
        env:
          NUMBA_CACHE_DIR: .numba_cache
        run: |
          python -c "from worldgen import _precompile_kernels; _precompile_kernels(4)"
      - name: Run tests
        env:
          NUMBA_CACHE_DIR: .numba_cache
        run: |
          pytest -q
