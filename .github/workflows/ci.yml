name: CI

on:
  push:
    branches: [ main, master, develop, "claude/**" ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev

    - name: Install dev dependencies
      run: |
        python -m pip install -U pip
        pip install -e ".[dev]"

    - name: Verify glyphs.yaml is up to date
      run: |
        python scripts/generate_glyphs.py
        git diff --exit-code fonts/glyphs.yaml fonts/glyphs_report.txt

    - name: Check formatting with black
      run: |
        black --check --diff .

    - name: Type check with mypy
      run: |
        mypy --strict .
      continue-on-error: true  # Allow to fail initially while fixing violations

    - name: Lint with ruff
      run: |
        ruff check .
      continue-on-error: true  # Allow to fail initially while fixing violations

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short
