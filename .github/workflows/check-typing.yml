name: Enforce typing rules
on: [push, pull_request]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/check_pep585.py
      - run: black --check .
      - run: ruff check .
      - run: mypy .
      - run: pytest -q
