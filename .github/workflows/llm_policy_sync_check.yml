name: LLM policy sync check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  check-llm-policy:
    name: Check LLM policy sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install pip (if needed)
        run: python -m pip install --upgrade pip

      - name: Run LLM policy sync check
        run: |
          # Fail if generated copies are out of date
          python scripts/sync_llm_policy.py --check

      - name: Run deterministic randomness check
        run: |
          # Fail on direct nondeterministic randomness outside approved boundaries
          python scripts/check_deterministic_random.py
