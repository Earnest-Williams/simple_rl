name: Modernize typing (manual)
on:
  workflow_dispatch:
jobs:
  modernize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install pyupgrade ruff black mypy
      - run: pyupgrade --py311-plus -r .
      - run: python scripts/cleanup_typing_imports.py
      - run: ruff --fix .
      - run: black .
      - run: mypy .
      - name: Commit & push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: modernize typing to PEP-585 (automated)"
            git push
          else
            echo "No changes to commit"
          fi
