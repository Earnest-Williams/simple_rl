name: Modernize typing (manual)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  modernize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # persist-credentials is true by default; keeps GITHUB_TOKEN available for pushes
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run modernization script
        run: |
          chmod +x ./scripts/modernize_all.sh
          # run script with a unique branch name to avoid collisions
          BRANCH="modernize/pep585-action-$(date +%s)"
          ./scripts/modernize_all.sh "$BRANCH"
          # expose branch name to subsequent steps
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Push modernization branch
        env:
          BRANCH: ${{ env.BRANCH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # ensure branch exists
          git rev-parse --verify "$BRANCH"
          # push branch
          git push origin "$BRANCH"
          echo "Pushed branch $BRANCH"

      - name: Optionally open PR (requires gh CLI or GitHub API)
        run: |
          echo "Manual: open a PR from branch $BRANCH to main or do it in the web UI."
