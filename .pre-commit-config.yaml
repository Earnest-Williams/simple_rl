repos:
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "0.1.14"
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: check-pep585
        name: Check PEP585 generics
        entry: python scripts/check_pep585.py
        language: system
        files: \.py$
